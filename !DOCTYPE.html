<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Demonstration</title>

    <link rel="stylesheet" href="styles.css">

    <style>
        h1 {
            color: red;
            text-decoration: underline;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h1>This heading uses External/Internal CSS</h1>

    <h1 style="color: red; text-decoration: underline; padding: 10px;">
        This heading uses Inline CSS
    </h1>

    <p>Both headings above will appear red, underlined, and have 10px of padding.</p>

</body>
</html>
